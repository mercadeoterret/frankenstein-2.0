services:
  - type: web
    name: terret-frankenstein
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: GCP_PROJECT_ID
        sync: false
      - key: GCP_PRIVATE_KEY_ID
        sync: false
      - key: GCP_PRIVATE_KEY
        sync: false
      - key: GCP_CLIENT_EMAIL
        sync: false
      - key: GCP_CLIENT_ID
        sync: false
      - key: GCP_CLIENT_CERT_URL
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      - key: META_AD_ACCOUNT_ID
        sync: false
